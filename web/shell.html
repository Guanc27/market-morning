<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="/extension/dist/styles.css" />
  <style>
    html, body { margin: 0; height: 100%; overflow: auto; background: #0a0f0d; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script>
    window.MM_API = window.parent.MM_API || (location.origin.replace(/:\d+$/, ':8742') || '');
    // Prefer same-origin API when served behind reverse proxy
    if (!window.MM_API || window.MM_API === location.origin) {
      window.MM_API = location.origin;
    }
  </script>
  <script src="/app/mm-bridge.js"></script>
  <script src="/extension/dist/app.js"></script>
</body>
</html>
