<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" shape-rendering="crispEdges">
  <rect width="128" height="128" rx="16" fill="#f6f4ef"/>
  <g transform="translate(24,28) scale(8)">
    <!-- coffee steam -->
    <rect x="4" y="0" width="1" height="1" fill="#2d5a4f"/>
    <rect x="6" y="0" width="1" height="1" fill="#2d5a4f"/>
    <rect x="5" y="1" width="1" height="1" fill="#1a3c34"/>
    <!-- mug -->
    <rect x="2" y="2" width="6" height="1" fill="#0a0a0a"/>
    <rect x="2" y="3" width="1" height="4" fill="#0a0a0a"/>
    <rect x="7" y="3" width="1" height="4" fill="#0a0a0a"/>
    <rect x="8" y="4" width="1" height="2" fill="#0a0a0a"/>
    <rect x="2" y="7" width="6" height="1" fill="#0a0a0a"/>
    <!-- coffee fill -->
    <rect x="3" y="3" width="4" height="1" fill="#e8622a"/>
    <rect x="3" y="4" width="4" height="3" fill="#1a3c34"/>
    <!-- tiny chart on mug -->
    <rect x="4" y="5" width="1" height="1" fill="#e8622a"/>
    <rect x="5" y="4" width="1" height="2" fill="#f6f4ef"/>
    <rect x="6" y="3" width="1" height="3" fill="#e8622a"/>
  </g>
</svg>
