<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" shape-rendering="crispEdges">
  <rect width="128" height="128" rx="16" fill="#0a0a0a"/>
  <g transform="translate(24,28) scale(8)">
    <!-- angry bull / strong bullish -->
    <rect x="1" y="3" width="1" height="2" fill="#e8622a"/>
    <rect x="8" y="3" width="1" height="2" fill="#e8622a"/>
    <rect x="2" y="2" width="1" height="1" fill="#2d5a4f"/>
    <rect x="7" y="2" width="1" height="1" fill="#2d5a4f"/>
    <rect x="2" y="3" width="6" height="1" fill="#f6f4ef"/>
    <rect x="2" y="4" width="6" height="2" fill="#f6f4ef"/>
    <rect x="3" y="4" width="1" height="1" fill="#e8622a"/>
    <rect x="6" y="4" width="1" height="1" fill="#e8622a"/>
    <rect x="4" y="5" width="2" height="1" fill="#0a0a0a"/>
    <rect x="3" y="6" width="4" height="1" fill="#e8622a"/>
    <!-- steam / bullish energy -->
    <rect x="3" y="1" width="1" height="1" fill="#2d5a4f"/>
    <rect x="5" y="0" width="1" height="1" fill="#e8622a"/>
    <rect x="6" y="1" width="1" height="1" fill="#2d5a4f"/>
    <!-- BULL text pixel hint - tiny green up arrow -->
    <rect x="0" y="5" width="1" height="1" fill="#2d5a4f"/>
    <rect x="0" y="4" width="1" height="1" fill="#2d5a4f"/>
    <rect x="0" y="3" width="1" height="1" fill="#e8622a"/>
  </g>
</svg>
