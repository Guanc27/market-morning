<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" shape-rendering="crispEdges">
  <rect width="128" height="128" rx="16" fill="#1a3c34"/>
  <g transform="translate(16,40) scale(8)">
    <!-- charging bull side profile 12x8 -->
    <rect x="2" y="4" width="1" height="1" fill="#e8622a"/>
    <rect x="3" y="3" width="1" height="1" fill="#e8622a"/>
    <rect x="4" y="2" width="1" height="1" fill="#f6f4ef"/>
    <rect x="5" y="3" width="1" height="1" fill="#f6f4ef"/>
    <rect x="6" y="2" width="1" height="1" fill="#f6f4ef"/>
    <rect x="7" y="3" width="1" height="1" fill="#f6f4ef"/>
    <rect x="8" y="2" width="1" height="1" fill="#f6f4ef"/>
    <rect x="9" y="1" width="1" height="1" fill="#f6f4ef"/>
    <rect x="10" y="0" width="1" height="1" fill="#e8622a"/>
    <rect x="11" y="1" width="1" height="1" fill="#e8622a"/>
    <!-- body fill -->
    <rect x="3" y="4" width="8" height="1" fill="#f6f4ef"/>
    <rect x="4" y="5" width="6" height="1" fill="#f6f4ef"/>
    <rect x="5" y="6" width="4" height="1" fill="#f6f4ef"/>
    <rect x="2" y="5" width="1" height="1" fill="#f6f4ef"/>
    <rect x="1" y="6" width="1" height="1" fill="#2d5a4f"/>
    <rect x="0" y="7" width="12" height="1" fill="#0a0a0a"/>
    <!-- eye -->
    <rect x="9" y="2" width="1" height="1" fill="#0a0a0a"/>
    <!-- leg -->
    <rect x="5" y="7" width="1" height="1" fill="#f6f4ef"/>
    <rect x="8" y="7" width="1" height="1" fill="#f6f4ef"/>
  </g>
</svg>
