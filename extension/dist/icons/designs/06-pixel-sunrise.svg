<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" shape-rendering="crispEdges">
  <rect width="128" height="128" rx="16" fill="#1a3c34"/>
  <!-- 8px pixel grid, scaled -->
  <g transform="translate(32,32) scale(8)">
    <!-- sky -->
    <rect x="0" y="0" width="8" height="3" fill="#0f241e"/>
    <!-- sun pixels -->
    <rect x="3" y="1" width="2" height="1" fill="#e8622a"/>
    <rect x="2" y="2" width="4" height="1" fill="#e8622a"/>
    <rect x="2" y="3" width="1" height="1" fill="#ffb088"/>
    <rect x="5" y="3" width="1" height="1" fill="#ffb088"/>
    <rect x="3" y="3" width="2" height="1" fill="#f6f4ef"/>
    <!-- horizon -->
    <rect x="0" y="4" width="8" height="1" fill="#2d5a4f"/>
    <!-- chart bars -->
    <rect x="1" y="5" width="1" height="2" fill="#f6f4ef"/>
    <rect x="3" y="4" width="1" height="3" fill="#e8622a"/>
    <rect x="5" y="3" width="1" height="4" fill="#f6f4ef"/>
    <rect x="7" y="5" width="1" height="2" fill="#2d5a4f"/>
    <!-- ground -->
    <rect x="0" y="7" width="8" height="1" fill="#0a0a0a"/>
  </g>
</svg>
